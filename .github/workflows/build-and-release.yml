name: Build and Mirror Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android Release APK
        run: ./gradlew assembleRelease

      # Sign the APK using the r0adkll action
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # Rename the SIGNED output file. 
      - name: Rename Signed APK
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} Tend-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: Tend-${{ github.ref_name }}.apk
          generate_release_notes: true

      - name: Install Codeberg CLI (Tea)
        run: |
          curl -sL https://gitea.com/gitea/tea/releases/download/v0.9.2/tea-0.9.2-linux-amd64 -o tea
          chmod +x tea
          sudo mv tea /usr/local/bin/

      - name: Mirror Release to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          tea login add --name codeberg --url https://codeberg.org --token $CODEBERG_TOKEN
          
          # Replace with your actual Codeberg repo info
          tea release create \
            --repo your-codeberg-username/your-repo-name \
            --tag ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --note "Automated release mirrored from GitHub." \
            --asset Tend-${{ github.ref_name }}.apk
